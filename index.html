<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhotoShare</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

h1 {
  background: #333;
  color: white;
  padding: 15px;
}

.upload-box {
  margin: 20px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.btn {
  margin-top: 8px;
  padding: 5px 10px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.btn:hover {
  background: #0056b3;
}
</style>
</head>

<body><h2>Free HD Images Download</h2>

<div class="gallery">
  <img src="https://via.placeholder.com/300" alt="image1">
  <p>Free HD Image 1</p>

  <img src="https://via.placeholder.com/300" alt="image2">
  <p>Free HD Image 2</p>
</div>

<h1>📸 PhotoShare</h1>

<div class="upload-box">
  <input type="file" id="upload" accept="image/*">
  <button class="btn" onclick="uploadPhoto()">Upload</button>
</div>

<div class="gallery" id="gallery"></div>

<script>
function uploadPhoto() {
  let file = document.getElementById("upload").files[0];
  if (!file) return alert("Select image first!");

  let url = URL.createObjectURL(file);

  let card = document.createElement("div");
  card.className = "card";

  let img = document.createElement("img");
  img.src = url;

  let download = document.createElement("a");
  download.href = url;
  download.download = "photo";
  download.innerText = "Download";
  download.className = "btn";

  card.appendChild(img);
  card.appendChild(download);

  document.getElementById("gallery").appendChild(card);
}
</script>

</body><div class="gallery">

  <img src="https://via.placeholder.com/300">
  <p>Free Image 1</p>

  <img src="https://via.placeholder.com/300">
  <p>Free Image 2</p>

  <img src="https://via.placeholder.com/300">
  <p>Free Image 3</p>

  <img src="https://via.placeholder.com/300">
  <p>Free Image 4</p>

</div>
</html>
